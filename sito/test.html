<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alpha Test 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a2540;
      --gold: #b8943f;
      --gold-light: #d4af6a;
      --cream: #f5f2ee;
      --text: #1a2540;
      --text-muted: #6b7694;
      --white: #ffffff;
      --green: #3a8c5c;
      --red: #c0392b;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--navy);
      padding: 20px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--gold-light); }

    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      color: var(--white);
    }

    .header-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold-light);
      background: rgba(184,148,63,0.15);
      padding: 5px 14px;
      border-radius: 20px;
    }

    /* ── WRAPPER ── */
    .wrapper {
      max-width: 820px;
      margin: 0 auto;
      padding: 60px 32px;
    }

    /* ── START SCREEN ── */
    #start-screen {
      text-align: center;
      padding: 80px 0;
    }

    #start-screen h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 52px;
      font-weight: 300;
      color: var(--navy);
      margin-bottom: 16px;
    }

    #start-screen p {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 480px;
      margin: 0 auto 48px;
    }

    .info-boxes {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }

    .info-box {
      background: var(--white);
      border: 1px solid rgba(26,37,64,0.08);
      border-radius: 10px;
      padding: 20px 28px;
      text-align: center;
      min-width: 140px;
    }

    .info-box .num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      color: var(--navy);
      line-height: 1;
      margin-bottom: 4px;
    }

    .info-box .lbl {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .btn-start {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 18px 48px;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-start:hover {
      background: var(--navy-light, #243058);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(26,37,64,0.25);
    }

    /* ── QUIZ ── */
    #quiz-screen { display: none; }

    .progress-bar-wrap {
      background: rgba(26,37,64,0.08);
      border-radius: 4px;
      height: 4px;
      margin-bottom: 40px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(to right, var(--gold), var(--gold-light));
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .q-number {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
    }

    .q-tema {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      background: rgba(26,37,64,0.06);
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .question-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      color: var(--navy);
      line-height: 1.5;
      margin-bottom: 36px;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 40px;
    }

    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 18px 22px;
      background: var(--white);
      border: 1.5px solid rgba(26,37,64,0.1);
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      color: var(--text);
      transition: all 0.2s;
      line-height: 1.5;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--gold);
      background: rgba(184,148,63,0.04);
    }

    .option-btn .letter {
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      min-width: 22px;
      height: 22px;
      background: rgba(184,148,63,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .option-btn.correct {
      background: rgba(58,140,92,0.08);
      border-color: var(--green);
    }

    .option-btn.correct .letter {
      background: var(--green);
      color: white;
    }

    .option-btn.wrong {
      background: rgba(192,57,43,0.07);
      border-color: var(--red);
    }

    .option-btn.wrong .letter {
      background: var(--red);
      color: white;
    }

    .option-btn:disabled { cursor: default; }

    .feedback-row {
      display: flex;
      justify-content: flex-end;
      min-height: 44px;
    }

    .btn-next {
      padding: 14px 40px;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 6px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      display: none;
      transition: all 0.3s;
    }

    .btn-next:hover { background: #243058; }

    /* ── RESULTS ── */
    #result-screen {
      display: none;
      text-align: center;
    }

    .result-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 3px solid var(--gold);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 40px;
      background: white;
    }

    .result-pct {
      font-family: 'Cormorant Garamond', serif;
      font-size: 52px;
      font-weight: 300;
      color: var(--navy);
      line-height: 1;
    }

    .result-pct-sign {
      font-size: 20px;
      color: var(--gold);
    }

    .result-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      font-weight: 300;
      color: var(--navy);
      margin-bottom: 12px;
    }

    .result-sub {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 48px;
    }

    .result-temi {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      text-align: left;
      margin-bottom: 48px;
    }

    .tema-box {
      background: white;
      border: 1px solid rgba(26,37,64,0.08);
      border-radius: 8px;
      padding: 18px 20px;
    }

    .tema-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .tema-score {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      margin-bottom: 6px;
    }

    .tema-bar {
      height: 3px;
      background: rgba(26,37,64,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .tema-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.8s ease;
    }

    .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-retry {
      padding: 16px 40px;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-retry:hover { background: #243058; }

    .btn-dash {
      padding: 16px 40px;
      background: transparent;
      color: var(--navy);
      border: 1.5px solid rgba(26,37,64,0.2);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-dash:hover { border-color: var(--navy); }

    @media (max-width: 600px) {
      .header { padding: 16px 20px; }
      .wrapper { padding: 40px 20px; }
      .question-text { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <a href="dashboard.html" class="back-link">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L4 7l5 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Dashboard
      </a>
      <div class="header-title">Alpha Test 2026</div>
    </div>
    <div class="header-badge">Simulazione</div>
  </div>

  <div class="wrapper">

    <!-- START -->
    <div id="start-screen">
      <h1>Alpha Test<br />2026</h1>
      <p>Simulazione d'esame a risposta multipla. Le domande vengono selezionate casualmente dall'archivio.</p>
      <div class="info-boxes">
        <div class="info-box">
          <div class="num">30</div>
          <div class="lbl">Domande</div>
        </div>
        <div class="info-box">
          <div class="num" id="total-archive">—</div>
          <div class="lbl">In archivio</div>
        </div>
        <div class="info-box">
          <div class="num">6</div>
          <div class="lbl">Macrotemi</div>
        </div>
      </div>
      <button class="btn-start" onclick="startTest()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><polygon points="6,4 14,9 6,14" fill="currentColor"/></svg>
        Inizia il test
      </button>
    </div>

    <!-- QUIZ -->
    <div id="quiz-screen">
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="question-meta">
        <div class="q-number" id="q-number">Domanda 1 / 30</div>
        <div class="q-tema" id="q-tema">—</div>
      </div>
      <div class="question-text" id="question-text">...</div>
      <div class="options-list" id="options-list"></div>
      <div class="feedback-row">
        <button class="btn-next" id="btn-next" onclick="nextQuestion()">Prossima →</button>
      </div>
    </div>

    <!-- RESULTS -->
    <div id="result-screen">
      <div class="result-circle">
        <div class="result-pct" id="r-pct">0<span class="result-pct-sign">%</span></div>
      </div>
      <div class="result-title" id="r-title">Ottimo risultato!</div>
      <div class="result-sub" id="r-sub">Hai risposto correttamente a 0 domande su 30.</div>
      <div class="result-temi" id="r-temi"></div>
      <div class="btn-group">
        <button class="btn-retry" onclick="resetTest()">Nuovo test</button>
        <button class="btn-dash" onclick="window.location.href='dashboard.html'">Dashboard</button>
      </div>
    </div>
  </div>

  <script>
    // ── Auth check ──
    if (!sessionStorage.getItem('auth_user')) {
      window.location.href = 'login.html?azienda=3a';
    }

    let allQuestions = [];
    let testQuestions = [];
    let currentIndex = 0;
    let answers = []; // {correct: bool, tema: string}
    const NUM_QUESTIONS = 30;

    // ── Carica domande ──
    fetch('data/domande.json')
      .then(r => r.json())
      .then(data => {
        allQuestions = data;
        document.getElementById('total-archive').textContent = data.length;
      });

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function startTest() {
      // Seleziona 30 domande casuali
      testQuestions = shuffle(allQuestions).slice(0, NUM_QUESTIONS);
      currentIndex = 0;
      answers = [];

      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('quiz-screen').style.display = 'block';
      renderQuestion();
    }

    function renderQuestion() {
      const q = testQuestions[currentIndex];
      const total = testQuestions.length;

      // Progress
      document.getElementById('progress-bar').style.width = ((currentIndex / total) * 100) + '%';
      document.getElementById('q-number').textContent = `Domanda ${currentIndex + 1} / ${total}`;
      document.getElementById('q-tema').textContent = q.macrotema || '';
      document.getElementById('question-text').textContent = q.domanda;
      document.getElementById('btn-next').style.display = 'none';

      // Prepara opzioni
      const letters = Object.keys(q.opzioni);
      let displayOptions;

      if (q.mescola) {
        // Mescola SOLO le opzioni che non contengono "tutte" o "nessuna"
        const fixed = letters.filter(l => {
          const text = (q.opzioni[l] || '').toLowerCase();
          return text.includes('tutte') || text.includes('nessuna') || text.includes('precedenti');
        });
        const shuffleable = letters.filter(l => !fixed.includes(l));
        const shuffled = shuffle(shuffleable);
        // I fixed vanno sempre in fondo
        displayOptions = [...shuffled, ...fixed];
      } else {
        displayOptions = letters;
      }

      const list = document.getElementById('options-list');
      list.innerHTML = '';

      displayOptions.forEach((origLetter, i) => {
        const text = q.opzioni[origLetter];
        if (!text) return;

        const displayLetter = String.fromCharCode(65 + i); // A, B, C, D visivo
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.dataset.orig = origLetter;
        btn.innerHTML = `<span class="letter">${displayLetter}</span><span>${text}</span>`;
        btn.onclick = () => selectAnswer(btn, origLetter, q.risposta);
        list.appendChild(btn);
      });
    }

    function selectAnswer(clickedBtn, selectedLetter, correctLetter) {
      // Disabilita tutti i bottoni
      document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

      const isCorrect = selectedLetter === correctLetter;
      const q = testQuestions[currentIndex];

      // Evidenzia
      clickedBtn.classList.add(isCorrect ? 'correct' : 'wrong');

      if (!isCorrect) {
        // Mostra quella corretta
        document.querySelectorAll('.option-btn').forEach(b => {
          if (b.dataset.orig === correctLetter) b.classList.add('correct');
        });
      }

      answers.push({ correct: isCorrect, tema: q.macrotema || 'Altro' });
      document.getElementById('btn-next').style.display = 'inline-flex';
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex >= testQuestions.length) {
        showResults();
      } else {
        renderQuestion();
      }
    }

    function showResults() {
      document.getElementById('quiz-screen').style.display = 'none';
      document.getElementById('result-screen').style.display = 'block';

      const correct = answers.filter(a => a.correct).length;
      const total = answers.length;
      const pct = Math.round((correct / total) * 100);

      // Aggiorna UI
      document.getElementById('r-pct').innerHTML = `${pct}<span class="result-pct-sign">%</span>`;
      document.getElementById('r-sub').textContent = `Hai risposto correttamente a ${correct} domande su ${total}.`;

      const titles = {
        excellent: 'Risultato eccellente!',
        good: 'Buon risultato!',
        pass: 'Risultato sufficiente',
        fail: 'Continua ad allenarti'
      };
      const t = pct >= 85 ? 'excellent' : pct >= 70 ? 'good' : pct >= 60 ? 'pass' : 'fail';
      document.getElementById('r-title').textContent = titles[t];

      // Per macrotema
      const byTema = {};
      answers.forEach(a => {
        if (!byTema[a.tema]) byTema[a.tema] = { correct: 0, total: 0 };
        byTema[a.tema].total++;
        if (a.correct) byTema[a.tema].correct++;
      });

      const temiDiv = document.getElementById('r-temi');
      temiDiv.innerHTML = '';
      Object.entries(byTema).forEach(([tema, data]) => {
        const p = Math.round((data.correct / data.total) * 100);
        const color = p >= 70 ? 'var(--green)' : '#e07070';
        temiDiv.innerHTML += `<div class="tema-box">
          <div class="tema-name">${tema}</div>
          <div class="tema-score" style="color:${color}">${p}%</div>
          <div style="font-size:11px; color:var(--text-muted); margin-bottom:8px">${data.correct}/${data.total} corrette</div>
          <div class="tema-bar"><div class="tema-bar-fill" style="width:${p}%; background:${color}"></div></div>
        </div>`;
      });

      // Salva nel localStorage
      saveResult({ correct, total, pct, byTema, data: new Date().toLocaleDateString('it-IT') });
    }

    function saveResult(result) {
      const key = 'alpha_test_results';
      const existing = JSON.parse(localStorage.getItem(key) || '[]');
      existing.push(result);
      localStorage.setItem(key, JSON.stringify(existing));
    }

    function resetTest() {
      document.getElementById('result-screen').style.display = 'none';
      document.getElementById('start-screen').style.display = 'block';
    }
  </script>
</body>
</html>
