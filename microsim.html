<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Micro-Simulazioni</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy: #1a2540; --gold: #b8943f; --gold-light: #d4af6a; --cream: #f5f2ee; --text: #1a2540; --text-muted: #6b7694; --white: #ffffff; --green: #3a8c5c; --red: #c0392b; }
    body { font-family: 'Outfit', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
    .header { background: var(--navy); padding: 20px 48px; display: flex; justify-content: space-between; align-items: center; }
    .header-left { display: flex; align-items: center; gap: 24px; }
    .back-link { display: flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.2s; }
    .back-link:hover { color: var(--gold-light); }
    .header-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; color: var(--white); }
    .header-badge { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold-light); background: rgba(184,148,63,0.15); padding: 5px 14px; border-radius: 20px; }
    .wrapper { max-width: 820px; margin: 0 auto; padding: 60px 32px; }

    /* SELEZIONE TEMA */
    #select-screen h1 { font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 300; color: var(--navy); margin-bottom: 12px; }
    #select-screen p { font-size: 15px; color: var(--text-muted); margin-bottom: 48px; line-height: 1.6; }
    .temi-select-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
    .tema-select-card { background: var(--white); border: 1.5px solid rgba(26,37,64,0.1); border-radius: 10px; padding: 28px 24px; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
    .tema-select-card::before { content: ''; position: absolute; top:0; left:0; right:0; height:3px; background: linear-gradient(to right, var(--gold), var(--gold-light)); transform: scaleX(0); transform-origin: left; transition: transform 0.3s; }
    .tema-select-card:hover { border-color: rgba(184,148,63,0.4); transform: translateY(-3px); box-shadow: 0 8px 32px rgba(26,37,64,0.1); }
    .tema-select-card:hover::before { transform: scaleX(1); }
    .tema-icon { font-size: 28px; margin-bottom: 12px; }
    .tema-select-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; color: var(--navy); margin-bottom: 6px; }
    .tema-count { font-size: 12px; color: var(--text-muted); }
    .tema-best { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-top: 8px; display: inline-block; }

    /* QUIZ (riuso stili test.html) */
    #quiz-screen { display: none; }
    .progress-bar-wrap { background: rgba(26,37,64,0.08); border-radius: 4px; height: 4px; margin-bottom: 40px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(to right, var(--gold), var(--gold-light)); border-radius: 4px; transition: width 0.4s ease; }
    .question-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .q-number { font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); }
    .q-tema { font-size: 11px; font-weight: 500; color: var(--text-muted); background: rgba(26,37,64,0.06); padding: 4px 12px; border-radius: 20px; }
    .q-timer { font-size: 13px; font-weight: 600; color: var(--text-muted); }
    .question-text { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; color: var(--navy); line-height: 1.5; margin-bottom: 36px; }
    .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }
    .option-btn { display: flex; align-items: flex-start; gap: 16px; padding: 18px 22px; background: var(--white); border: 1.5px solid rgba(26,37,64,0.1); border-radius: 8px; cursor: pointer; text-align: left; font-family: 'Outfit', sans-serif; font-size: 15px; color: var(--text); transition: all 0.2s; line-height: 1.5; }
    .option-btn:hover:not(:disabled) { border-color: var(--gold); background: rgba(184,148,63,0.04); }
    .option-btn .letter { font-size: 12px; font-weight: 700; color: var(--gold); min-width: 22px; height: 22px; background: rgba(184,148,63,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .option-btn.correct { background: rgba(58,140,92,0.08); border-color: var(--green); }
    .option-btn.correct .letter { background: var(--green); color: white; }
    .option-btn.wrong { background: rgba(192,57,43,0.07); border-color: var(--red); }
    .option-btn.wrong .letter { background: var(--red); color: white; }
    .option-btn:disabled { cursor: default; }
    .feedback-row { display: flex; justify-content: flex-end; }
    .btn-next { padding: 14px 40px; background: var(--navy); color: var(--white); border: none; border-radius: 6px; font-size: 13px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; display: none; transition: all 0.3s; }
    .btn-next:hover { background: #243058; }

    /* RESULT */
    #result-screen { display: none; text-align: center; }
    .result-circle { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--gold); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; background: white; }
    .result-pct { font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 300; color: var(--navy); }
    .result-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; color: var(--navy); margin-bottom: 8px; }
    .result-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 40px; }
    .errori-list { display: flex; flex-direction: column; gap: 14px; text-align: left; margin-bottom: 40px; }
    .errore-card { background: white; border: 1px solid rgba(192,57,43,0.2); border-left: 4px solid var(--red); border-radius: 8px; padding: 18px 22px; }
    .errore-domanda { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 300; color: var(--navy); margin-bottom: 10px; line-height: 1.4; }
    .errore-row { display: flex; gap: 8px; align-items: flex-start; font-size: 13px; margin-bottom: 5px; }
    .errore-badge { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; flex-shrink: 0; }
    .badge-wrong { background: rgba(192,57,43,0.1); color: var(--red); }
    .badge-correct { background: rgba(58,140,92,0.1); color: var(--green); }
    .btn-group { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-retry { padding: 14px 36px; background: var(--navy); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
    .btn-back { padding: 14px 36px; background: transparent; color: var(--navy); border: 1.5px solid rgba(26,37,64,0.2); border-radius: 8px; font-size: 13px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
    @media (max-width: 600px) { .header { padding: 16px 20px; } .wrapper { padding: 40px 20px; } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <a href="dashboard.html" class="back-link">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L4 7l5 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Dashboard
      </a>
      <div class="header-title">Micro-Simulazioni</div>
    </div>
    <div class="header-badge">15 Domande</div>
  </div>

  <div class="wrapper">
    <!-- SELEZIONE TEMA -->
    <div id="select-screen">
      <h1>Scegli un<br/>Macrotema</h1>
      <p>Allenati su un argomento specifico con 15 domande selezionate casualmente da quell'area.</p>
      <div class="temi-select-grid" id="temi-grid">
        <div style="color:var(--text-muted)">Caricamento...</div>
      </div>
    </div>

    <!-- QUIZ -->
    <div id="quiz-screen">
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="question-meta">
        <div class="q-number" id="q-number">—</div>
        <div class="q-tema" id="q-tema">—</div>
        <div class="q-timer" id="q-timer">0s</div>
      </div>
      <div class="question-text" id="question-text">...</div>
      <div class="options-list" id="options-list"></div>
      <div class="feedback-row"><button class="btn-next" id="btn-next" onclick="nextQuestion()">Prossima →</button></div>
    </div>

    <!-- RESULTS -->
    <div id="result-screen">
      <div class="result-circle"><div class="result-pct" id="r-pct">0%</div></div>
      <div class="result-title" id="r-title">—</div>
      <div class="result-sub" id="r-sub">—</div>
      <div style="text-align:left; margin-bottom:24px">
        <div style="font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:300; color:var(--navy); margin-bottom:16px">Domande Sbagliate</div>
        <div class="errori-list" id="r-errori"></div>
      </div>
      <div class="btn-group">
        <button class="btn-retry" onclick="retryTema()">Riprova questo tema</button>
        <button class="btn-back" onclick="backToSelect()">Scegli altro tema</button>
      </div>
    </div>
  </div>

  <script>
    if (!sessionStorage.getItem('auth_user')) window.location.href = 'login.html';

    const ICONS = { 'Risk Management':'🛡️', 'Security aziendale':'🏢', 'Normativa':'📋', 'Crisis & emergenze':'🚨', 'Geopolitica':'🌍', 'Sicurezza informazioni':'🔒' };
    const NUM_QUESTIONS = 15;
    let allQuestions = [], currentTema = '', testQuestions = [], currentIndex = 0, answers = [];
    let timerInterval, questionStartTime;

    fetch('domande.json')
      .then(r => r.json())
      .then(data => {
        allQuestions = data;
        buildTemiGrid();
        // Se arrivo da test.html con tema preselezionato
        const presel = sessionStorage.getItem('microsim_tema');
        if (presel) { sessionStorage.removeItem('microsim_tema'); startTema(presel); }
      });

    function buildTemiGrid() {
      // Categorie dinamiche dal JSON
      const temiMap = {};
      allQuestions.forEach(q => {
        if (!q.macrotema) return;
        if (!temiMap[q.macrotema]) temiMap[q.macrotema] = 0;
        temiMap[q.macrotema]++;
      });

      // Migliori score salvati
      const gruppo = sessionStorage.getItem('auth_gruppo') || 'default';
      const results = JSON.parse(localStorage.getItem('alpha_test_results_' + gruppo) || '[]');
      const bestByTema = {};
      results.forEach(r => {
        if (r.byTema) Object.entries(r.byTema).forEach(([t, d]) => {
          const p = Math.round((d.correct / d.total) * 100);
          if (!bestByTema[t] || p > bestByTema[t]) bestByTema[t] = p;
        });
      });

      const grid = document.getElementById('temi-grid');
      grid.innerHTML = Object.entries(temiMap).map(([tema, count]) => {
        const icon = ICONS[tema] || '📚';
        const best = bestByTema[tema];
        const bestHtml = best !== undefined
          ? `<span class="tema-best" style="background:${best>=70?'rgba(58,140,92,0.1)':'rgba(192,57,43,0.08)'}; color:${best>=70?'var(--green)':'var(--red)'}">${best}% miglior score</span>`
          : `<span class="tema-best" style="background:rgba(107,118,148,0.1); color:var(--text-muted)">Non ancora svolto</span>`;
        return `<div class="tema-select-card" onclick="startTema('${tema}')">
          <div class="tema-icon">${icon}</div>
          <div class="tema-select-name">${tema}</div>
          <div class="tema-count">${count} domande disponibili</div>
          ${bestHtml}
        </div>`;
      }).join('');
    }

    function startTema(tema) {
      currentTema = tema;
      const pool = allQuestions.filter(q => q.macrotema === tema);
      testQuestions = shuffle(pool).slice(0, Math.min(NUM_QUESTIONS, pool.length));
      currentIndex = 0; answers = [];
      document.getElementById('select-screen').style.display = 'none';
      document.getElementById('result-screen').style.display = 'none';
      document.getElementById('quiz-screen').style.display = 'block';
      renderQuestion();
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
      return a;
    }

    function startTimer() {
      questionStartTime = Date.now(); let secs = 0;
      clearInterval(timerInterval);
      timerInterval = setInterval(() => { secs++; document.getElementById('q-timer').textContent = secs + 's'; }, 1000);
    }

    function renderQuestion() {
      const q = testQuestions[currentIndex];
      document.getElementById('progress-bar').style.width = ((currentIndex / testQuestions.length) * 100) + '%';
      document.getElementById('q-number').textContent = `Domanda ${currentIndex + 1} / ${testQuestions.length}`;
      document.getElementById('q-tema').textContent = q.macrotema || '';
      document.getElementById('q-timer').textContent = '0s';
      document.getElementById('question-text').textContent = q.domanda;
      document.getElementById('btn-next').style.display = 'none';
      startTimer();

      const letters = Object.keys(q.opzioni);
      let displayOptions;
      if (q.mescola) {
        const fixed = letters.filter(l => { const t = (q.opzioni[l]||'').toLowerCase(); return t.includes('tutte')||t.includes('nessuna')||t.includes('precedenti'); });
        displayOptions = [...shuffle(letters.filter(l=>!fixed.includes(l))), ...fixed];
      } else { displayOptions = letters; }

      const list = document.getElementById('options-list');
      list.innerHTML = '';
      displayOptions.forEach((orig, i) => {
        const text = q.opzioni[orig]; if (!text) return;
        const btn = document.createElement('button');
        btn.className = 'option-btn'; btn.dataset.orig = orig; btn.dataset.text = text;
        btn.innerHTML = `<span class="letter">${String.fromCharCode(65+i)}</span><span>${text}</span>`;
        btn.onclick = () => selectAnswer(btn, orig, q);
        list.appendChild(btn);
      });
    }

    function selectAnswer(clickedBtn, sel, q) {
      clearInterval(timerInterval);
      document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
      const ok = sel === q.risposta;
      clickedBtn.classList.add(ok ? 'correct' : 'wrong');
      if (!ok) document.querySelectorAll('.option-btn').forEach(b => { if (b.dataset.orig === q.risposta) b.classList.add('correct'); });
      answers.push({ correct: ok, domanda: q.domanda, scelta: clickedBtn.dataset.text, corretta: q.opzioni[q.risposta] || '' });
      document.getElementById('btn-next').style.display = 'inline-flex';
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex >= testQuestions.length) showResults();
      else renderQuestion();
    }

    function showResults() {
      document.getElementById('quiz-screen').style.display = 'none';
      document.getElementById('result-screen').style.display = 'block';
      const correct = answers.filter(a => a.correct).length;
      const pct = Math.round((correct / answers.length) * 100);
      document.getElementById('r-pct').textContent = pct + '%';
      document.getElementById('r-sub').textContent = `${correct} corrette su ${answers.length} · ${currentTema}`;
      document.getElementById('r-title').textContent = pct >= 85 ? 'Eccellente!' : pct >= 70 ? 'Buon lavoro!' : pct >= 60 ? 'Sufficiente' : 'Continua ad allenarti';
      const errori = answers.filter(a => !a.correct);
      document.getElementById('r-errori').innerHTML = errori.length === 0
        ? `<p style="color:var(--green); font-weight:500">🎉 Nessun errore!</p>`
        : errori.map(e => `<div class="errore-card">
            <div class="errore-domanda">${e.domanda}</div>
            <div class="errore-row"><span class="errore-badge badge-wrong">Tua risposta</span><span style="color:var(--red)">${e.scelta}</span></div>
            <div class="errore-row"><span class="errore-badge badge-correct">Risposta corretta</span><span style="color:var(--green); font-weight:500">${e.corretta}</span></div>
          </div>`).join('');
      buildTemiGrid(); // aggiorna score cards
    }

    function retryTema() { startTema(currentTema); }
    function backToSelect() {
      document.getElementById('result-screen').style.display = 'none';
      document.getElementById('select-screen').style.display = 'block';
    }
  </script>
</body>
</html>
